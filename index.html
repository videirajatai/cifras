<script>
    // Configurações do seu Supabase
    const supabaseUrl = 'https://ryvfogmfpjyamgqsltks.supabase.co/rest/v1/cifras';
    const supabaseKey = 'sb_publishable_nFMOC-fPkJnsmf5_noOTBg_tKV6Cr1q';
    
    const escala = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const conversorBemol = {'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#'};
    let tamanhoFonteAtual = 16;
    let timerBusca;

    // 1. FUNÇÃO DE BUSCA DIRETO NA API (Corrigida com o cabeçalho Authorization)
    async function buscarNoSupabase() {
      const termo = document.getElementById('busca').value.trim();
      const lista = document.getElementById('resultados');
      
      if (termo.length < 2) { lista.style.display = 'none'; return; }

      clearTimeout(timerBusca);
      timerBusca = setTimeout(async () => {
        const termoFormatado = termo.toLowerCase().replace(/ /g, '%');
        const urlBusca = `${supabaseUrl}?select=id,artista,musica&busca=ilike.*${termoFormatado}*&limit=15`;

        try {
          const response = await fetch(urlBusca, { 
            headers: { 
              'apikey': supabaseKey,
              'Authorization': `Bearer ${supabaseKey}` // <- O crachá que faltava para evitar o erro de CORS
            } 
          });
          
          if (!response.ok) throw new Error("Erro na resposta do Supabase");
          
          const resultados = await response.json();

          lista.innerHTML = '';
          if (resultados.length > 0) {
            resultados.forEach(item => {
              const li = document.createElement('li');
              li.innerHTML = `<span class="nome-musica">${item.musica.replace(/-/g, ' ')}</span><span class="nome-artista">${item.artista.replace(/-/g, ' ')}</span>`;
              li.onclick = () => carregarCifraPorId(item.id);
              lista.appendChild(li);
            });
          } else {
            lista.innerHTML = '<li style="color:#888;">Nenhuma música encontrada.</li>';
          }
          lista.style.display = 'block';
        } catch (e) {
          console.error("Erro na busca", e);
        }
      }, 300);
    }

    // 2. CARREGAR CIFRA CLICADA (Corrigida com o cabeçalho Authorization)
    async function carregarCifraPorId(id) {
      document.getElementById('resultados').style.display = 'none';
      document.getElementById('busca').value = '';
      
      try {
        const response = await fetch(`${supabaseUrl}?id=eq.${id}&select=artista,musica,conteudo_html`, { 
          headers: { 
            'apikey': supabaseKey,
            'Authorization': `Bearer ${supabaseKey}` // <- O crachá que faltava aqui também
          } 
        });
        
        const dados = await response.json();
        const cifra = dados[0];
        
        document.getElementById('titulo-musica').innerText = cifra.musica.replace(/-/g, ' ');
        document.getElementById('nome-artista-view').innerText = cifra.artista.replace(/-/g, ' ');
        document.getElementById('cifra-display').innerHTML = cifra.conteudo_html;
        
        tamanhoFonteAtual = 16;
        document.getElementById('cifra-display').style.fontSize = tamanhoFonteAtual + 'px';

        mostrarTela('tela-cifra');
        window.scrollTo(0, 0);
      } catch (e) {
        alert("Erro ao abrir a cifra.");
      }
    }

    // 3. ADICIONAR NOVA CIFRA
    async function salvarNovaCifra() {
      const artista = document.getElementById('novo-artista').value.trim();
      const musica = document.getElementById('nova-musica').value.trim();
      const conteudo = document.getElementById('novo-conteudo').value;

      if (!artista || !musica || !conteudo) {
        alert("Preencha todos os campos!"); return;
      }

      const stringBusca = `${artista} ${musica} ${conteudo.substring(0, 200)}`.toLowerCase();
      const payload = {
        artista: artista,
        musica: musica,
        busca: stringBusca,
        conteudo_html: conteudo
      };

      try {
        const response = await fetch(supabaseUrl, {
          method: 'POST',
          headers: {
            'apikey': supabaseKey,
            'Authorization': `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert("✅ Cifra salva com sucesso!");
          fecharAdicionar();
          document.getElementById('novo-artista').value = '';
          document.getElementById('nova-musica').value = '';
          document.getElementById('novo-conteudo').value = '';
        } else {
          alert("Erro ao salvar. Verifique as permissões no Supabase.");
        }
      } catch (e) {
        alert("Erro de conexão.");
      }
    }

    // 4. FERRAMENTAS (Aumentar Fonte e Transpor Tom)
    function mudarTamanhoFonte(passos) {
      tamanhoFonteAtual += passos;
      if (tamanhoFonteAtual < 10) tamanhoFonteAtual = 10;
      if (tamanhoFonteAtual > 36) tamanhoFonteAtual = 36;
      document.getElementById('cifra-display').style.fontSize = tamanhoFonteAtual + 'px';
    }

    function mudarTom(passos) {
      const container = document.getElementById('cifra-display');
      let textoAtual = container.innerHTML;
      const regexAcordes = /\b([CDEFGAB](?:#|b)?)(m|dim|aug|sus|maj|min|[0-9])*(?![a-zA-Z#b])/g;

      const textoTransposto = textoAtual.replace(regexAcordes, function(acordeCompleto, notaRaiz, complemento) {
        let notaBase = conversorBemol[notaRaiz] || notaRaiz;
        let index = escala.indexOf(notaBase);
        if (index === -1) return acordeCompleto; 

        let novoIndex = (index + passos) % 12;
        if (novoIndex < 0) novoIndex += 12; 

        return escala[novoIndex] + (complemento || '');
      });
      container.innerHTML = textoTransposto;
    }

    // 5. CONTROLE DAS TELAS
    function mostrarTela(idTela) {
      document.getElementById('tela-cifra').style.display = 'none';
      document.getElementById('tela-adicionar').style.display = 'none';
      if (idTela) document.getElementById(idTela).style.display = 'block';
    }
    function abrirTelaAdicionar() { mostrarTela('tela-adicionar'); document.getElementById('resultados').style.display = 'none'; }
    function fecharAdicionar() { mostrarTela(''); }
    function fecharCifra() { mostrarTela(''); document.getElementById('cifra-display').innerHTML = ''; }
  </script>
